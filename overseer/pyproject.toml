[project]
name = "overseer"
version = "0.0.0"
description = "Persistent LLM with action tools, PG memory, health monitoring, session handoff."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "orxt-protocols",
    "trace",
    "session",
    "knowledge-module",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orxt"]

[tool.uv.sources]
orxt-protocols = { path = "../protocols", editable = true }
trace = { path = "../trace", editable = true }
session = { path = "../session", editable = true }
knowledge-module = { path = "../knowledge-module", editable = true }
