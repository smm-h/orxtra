[project]
name = "overseer"
version = "0.0.0"
description = "Persistent LLM with structured decision protocols, PG memory, health monitoring, session handoff."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "trace",
    "session",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overseer"]

[tool.uv.sources]
trace = { path = "../trace", editable = true }
session = { path = "../session", editable = true }
