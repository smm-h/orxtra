[project]
name = "cli"
version = "0.0.0"
description = "strictcli CLI frontend. Agents are the primary users."
requires-python = ">=3.12"
dependencies = [
    "strictcli",
    "services",
]
keywords = ["rlsbl"]

[project.scripts]
orxt = "orxt.cli._cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orxt"]

[tool.uv.sources]
services = { path = "../services", editable = true }
