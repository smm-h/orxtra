# orxtra monorepo workspace
# Philosophy: complexity if you need it, simplicity if you don't.
# Each sub-project is independently useful for a narrow purpose.
# Together they compose into a full autonomous agent orchestration system.

# --- Releasables ---

[[releasables]]
name = "orxtra"

# --- Foundation layer ---

[[projects]]
path = "protocols"
description = "Shared types: Execution, task lifecycle, event descriptors, action tool schemas"
library = true
releasable = "orxtra"

[[projects]]
path = "secrets"
description = "Secret registry, substitution, and scrubbing"
library = true
releasable = "orxtra"

[[projects]]
path = "write-safety"
description = "Write queue, stale-write detection, atomic replace, transient replay"
library = true
releasable = "orxtra"

[[projects]]
path = "transport"
description = "Typed LLM client via Provider protocol"
depends_on = ["protocols"]
library = true
releasable = "orxtra"

[[projects]]
path = "agent"
description = "Agent definition loader (TOML + composable .md prompts)"
library = true
releasable = "orxtra"

[[projects]]
path = "tool"
description = "Tool registry with granular constructors"
depends_on = ["protocols", "secrets", "write-safety"]
library = true
releasable = "orxtra"

[[projects]]
path = "verify"
description = "Check runner (pre/post-check Execution dispatch)"
depends_on = ["protocols"]
library = true
releasable = "orxtra"

[[projects]]
path = "trace"
description = "PG schema owner (events, task results, transcripts, inbox, state machines)"
library = true
releasable = "orxtra"

[[projects]]
path = "notepad"
description = "Append-only cross-agent context sharing"
depends_on = ["trace"]
library = true
releasable = "orxtra"

[[projects]]
path = "session"
description = "Session lifecycle, token tracking, cross-restart resumption"
depends_on = ["protocols", "transport", "trace"]
library = true
releasable = "orxtra"

# --- Orchestration layer ---

[[projects]]
path = "scheduler"
description = "Task executor (recursive hierarchy, budgets, constraints)"
depends_on = ["protocols", "agent", "tool", "write-safety", "session", "trace", "verify", "notepad", "secrets", "transport", "dispatch"]
releasable = "orxtra"

[[projects]]
path = "dispatch"
description = "Event delivery: subscriptions, action dispatch, accumulator flush"
depends_on = ["protocols"]
releasable = "orxtra"

# --- Intelligence layer ---

[[projects]]
path = "overseer"
description = "Persistent LLM with action tools, PG memory, session handoff"
depends_on = ["protocols", "trace", "session", "tool", "transport"]
releasable = "orxtra"

# --- Composition layer ---

[[projects]]
path = "services"
description = "Shared business logic for all frontends"
depends_on = ["agent", "dispatch", "protocols", "scheduler", "session", "overseer", "trace"]
releasable = "orxtra"

# --- Interface layer ---

[[projects]]
path = "cli"
description = "strictcli CLI frontend (agents are the primary users)"
depends_on = ["services", "trace"]
releasable = "orxtra"

[[projects]]
path = "mcp"
description = "MCP server (human interface via dashboard/AI client)"
depends_on = ["services", "trace"]
releasable = "orxtra"

# --- Infrastructure ---

[[projects]]
path = "schema"
description = "pgdesign database schema definitions"
dev_node = true
releasable = false

[[projects]]
path = "npm"
description = "npm shim package wrapping the Python CLI"
dev_node = true
releasable = false

# --- Architecture layers ---

[layers]
order = ["foundation", "orchestration", "intelligence", "composition", "interfaces"]

[layers.assignments]
foundation = ["protocols", "secrets", "write-safety", "transport", "agent", "tool", "verify", "trace", "notepad", "session"]
orchestration = ["scheduler", "dispatch"]
intelligence = ["overseer"]
composition = ["services"]
interfaces = ["cli", "mcp"]
