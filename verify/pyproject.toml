[project]
name = "verify"
version = "0.0.0"
description = "Verification runner. Ordered callable chains, structured verdicts, severity-gated blocking."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/verify"]
