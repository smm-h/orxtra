[project]
name = "tool"
version = "0.0.0"
description = "Tool registry with granular constructors. Path enforcement, write safety, no-truncation previews."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orxt"]
