[project]
name = "scheduler"
version = "0.0.0"
description = "Deterministic workflow executor. Dependency graphs, parallel steps, budgets, constraints, crash recovery."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "agent",
    "tool",
    "session",
    "trace",
    "verify",
    "notepad",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scheduler"]

[tool.uv.sources]
agent = { path = "../agent", editable = true }
tool = { path = "../tool", editable = true }
session = { path = "../session", editable = true }
trace = { path = "../trace", editable = true }
verify = { path = "../verify", editable = true }
notepad = { path = "../notepad", editable = true }
