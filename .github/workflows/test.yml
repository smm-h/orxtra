name: Root Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orxt_test
          POSTGRES_PASSWORD: orxt_test
          POSTGRES_DB: orxt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U orxt_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      ORXT_TEST_PG: "1"
      ORXT_TEST_PG_DSN: "postgresql://orxt_test:orxt_test@localhost:5432/orxt_test"
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest tests/ -x -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run ruff check .
