name: Publish to PyPI
on:
  release:
    types:
    - published
  workflow_dispatch:
jobs:
  no-op:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.release.tag_name, 'orxtra@v')"
    permissions: {}
    steps:
    - run: echo 'No publish target for this release tag'
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'orxtra@v')
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - run: uv build --out-dir dist
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
