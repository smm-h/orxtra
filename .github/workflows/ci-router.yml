name: CI Router
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      protocols: ${{ steps.changes.outputs.protocols }}
      secrets: ${{ steps.changes.outputs.secrets }}
      write-safety: ${{ steps.changes.outputs.write-safety }}
      transport: ${{ steps.changes.outputs.transport }}
      agent: ${{ steps.changes.outputs.agent }}
      tool: ${{ steps.changes.outputs.tool }}
      verify: ${{ steps.changes.outputs.verify }}
      trace: ${{ steps.changes.outputs.trace }}
      notepad: ${{ steps.changes.outputs.notepad }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: changes
      with:
        filters: |
          protocols: 'protocols/**'
          secrets: 'secrets/**'
          write-safety: 'write-safety/**'
          transport: 'transport/**'
          agent: 'agent/**'
          tool: 'tool/**'
          verify: 'verify/**'
          trace: 'trace/**'
          notepad: 'notepad/**'
  protocols:
    needs: detect
    if: needs.detect.outputs.protocols == 'true'
    uses: ./.github/workflows/protocols-ci.yml
  secrets:
    needs: detect
    if: needs.detect.outputs.secrets == 'true'
    uses: ./.github/workflows/secrets-ci.yml
  write-safety:
    needs: detect
    if: needs.detect.outputs.write-safety == 'true'
    uses: ./.github/workflows/write-safety-ci.yml
  transport:
    needs: detect
    if: needs.detect.outputs.transport == 'true'
    uses: ./.github/workflows/transport-ci.yml
  agent:
    needs: detect
    if: needs.detect.outputs.agent == 'true'
    uses: ./.github/workflows/agent-ci.yml
  tool:
    needs: detect
    if: needs.detect.outputs.tool == 'true'
    uses: ./.github/workflows/tool-ci.yml
  verify:
    needs: detect
    if: needs.detect.outputs.verify == 'true'
    uses: ./.github/workflows/verify-ci.yml
  trace:
    needs: detect
    if: needs.detect.outputs.trace == 'true'
    uses: ./.github/workflows/trace-ci.yml
  notepad:
    needs: detect
    if: needs.detect.outputs.notepad == 'true'
    uses: ./.github/workflows/notepad-ci.yml
