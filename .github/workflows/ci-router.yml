# DO NOT EDIT -- generated by rlsbl monorepo sync
name: CI Router
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      protocols: ${{ steps.changes.outputs.protocols }}
      secrets: ${{ steps.changes.outputs.secrets }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: changes
      with:
        filters: |
          protocols: 'protocols/**'
          secrets: 'secrets/**'
  protocols:
    needs: detect
    if: needs.detect.outputs.protocols == 'true'
    uses: ./.github/workflows/protocols-ci.yml
  secrets:
    needs: detect
    if: needs.detect.outputs.secrets == 'true'
    uses: ./.github/workflows/secrets-ci.yml
