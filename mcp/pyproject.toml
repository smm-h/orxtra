[project]
name = "mcp"
version = "0.0.0"
description = "MCP server exposing the orxt API. Human interface via dashboard or AI client."
requires-python = ">=3.12"
dependencies = [
    "services",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orxt"]

[tool.uv.sources]
services = { path = "../services", editable = true }
