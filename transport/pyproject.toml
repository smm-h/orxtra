[project]
name = "transport"
version = "0.0.0"
description = "Typed LLM client via Provider protocol. Raw httpx, streaming events, tool-call loop, auto-retry."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/transport"]
