# orxt monorepo root
# Not a publishable package. Each sub-project has its own pyproject.toml.
# This file makes the root installable so e2e tests can import all sub-projects.

[project]
name = "orxt"
version = "0.0.0"
description = "Autonomous multi-agent AI workflows"
requires-python = ">=3.12"
dependencies = [
    "orxt-protocols",
    "orxt-secrets",
    "orxt-write-safety",
    "transport",
    "agent",
    "tool",
    "verify",
    "trace",
    "notepad",
    "session",
    "scheduler",
    "overseer",
    "knowledge-module",
    "services",
    "cli",
    "mcp",
]

[tool.uv.sources]
orxt-protocols = { path = "protocols", editable = true }
orxt-secrets = { path = "secrets", editable = true }
orxt-write-safety = { path = "write-safety", editable = true }
transport = { path = "transport", editable = true }
agent = { path = "agent", editable = true }
tool = { path = "tool", editable = true }
verify = { path = "verify", editable = true }
trace = { path = "trace", editable = true }
notepad = { path = "notepad", editable = true }
session = { path = "session", editable = true }
scheduler = { path = "scheduler", editable = true }
overseer = { path = "overseer", editable = true }
knowledge-module = { path = "knowledge-module", editable = true }
services = { path = "services", editable = true }
cli = { path = "cli", editable = true }
mcp = { path = "mcp", editable = true }

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "respx",
    "asyncpg-stubs",
    "mypy",
    "ruff",
    "testcontainers[postgres]",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle -- no docstrings by convention
    "COM812",  # trailing comma (conflicts with ruff format)
    "ISC001",  # implicit string concat (conflicts with ruff format)
    "T201",    # print() -- needed in CLI
    "FBT",     # boolean positional args -- too noisy for tool constructors
    "TD",      # todo comments -- not relevant
    "FIX",     # fixme comments -- not relevant
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = [
    "S101",    # assert in tests is fine
    "PLR2004", # magic values in tests are fine
    "ARG",     # unused args in fixtures are fine
    "INP001",  # tests are implicit namespace packages
]
"**/_task.py" = ["TC002", "TC003"]   # pydantic models need runtime imports
"**/_tools.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_execution.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_types.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_writer.py" = ["PLR0913"]  # DB write methods have many columns

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "uuid6.*"
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
