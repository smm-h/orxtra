# orxt monorepo root
# Not a publishable package. Each sub-project has its own pyproject.toml.
# This file holds shared tool configuration only.

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle -- no docstrings by convention
    "ANN101",  # missing type annotation for self
    "ANN102",  # missing type annotation for cls
    "COM812",  # trailing comma (conflicts with ruff format)
    "ISC001",  # implicit string concat (conflicts with ruff format)
    "T201",    # print() -- needed in CLI
    "FBT",     # boolean positional args -- too noisy for tool constructors
    "TD",      # todo comments -- not relevant
    "FIX",     # fixme comments -- not relevant
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = [
    "S101",    # assert in tests is fine
    "PLR2004", # magic values in tests are fine
    "ARG",     # unused args in fixtures are fine
    "INP001",  # tests are implicit namespace packages
]
"**/_task.py" = ["TC002", "TC003"]   # pydantic models need runtime imports
"**/_tools.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_execution.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_types.py" = ["TC002", "TC003"]  # pydantic models need runtime imports
"**/_writer.py" = ["PLR0913"]  # DB write methods have many columns

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
